name: Deploy CLI to Dev (rebuilds backend)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Dev

    steps:
      # When calibrate CLI changes, the backend Docker image must be rebuilt
      # since it copies the calibrate package as a path dependency.
      - name: Rebuild backend on calibrate-dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CALIBRATE_DEV_HOST }}
          username: ally
          key: ${{ secrets.CALIBRATE_SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.METAL05_HOST }}
          proxy_username: ally
          proxy_key: ${{ secrets.CALIBRATE_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/calibrate
            git -C calibrate pull origin main
            docker compose -f calibrate-backend/docker-compose.yml up -d --build app
            docker image prune -f
            echo "✅ CLI updated and backend rebuilt on dev successfully"
